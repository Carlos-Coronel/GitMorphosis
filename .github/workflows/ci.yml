name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches-ignore: [main, master, gh-pages]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm type-check
        continue-on-error: true

      - name: Build verification
        run: pnpm build
        env:
          NEXT_PUBLIC_REPO_NAME: GitMorphosis
          NODE_ENV: production
